<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tracker do Koda</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/theme.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🍼 Tracker do Koda</h1>
            <p>Acesse sua conta para continuar</p>

            <!-- Demo Mode Button -->
            <div class="demo-mode-section">
                <button type="button" class="btn-demo" onclick="enterDemoMode()">
                    <span style="font-size: 1.5rem;">🎮</span>
                    <span>Experimentar Demo Grátis</span>
                    <small style="display: block; font-weight: 400; font-size: 0.8rem; margin-top: 4px;">
                        Sem cadastro • Dados temporários
                    </small>
                </button>
            </div>

            <div style="text-align: center; margin: 20px 0; color: #999; font-size: 0.9rem;">
                ou faça login com sua conta
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" required placeholder="seu@email.com">
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn-submit">Entrar</button>
            </form>

            <div class="auth-links">
                <p><a href="forgot-password.html">Esqueci minha senha</a></p>
                <p>Não tem uma conta? <a href="register.html">Cadastre-se</a></p>
            </div>
        </div>
    </div>

    <!-- Load modules in correct order -->
    <script src="js/config.js"></script>
    <script src="js/config-demo.js?v=2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script>
        // Enter Demo Mode
        async function enterDemoMode() {
            showMessage('Entrando no modo demo...', 'success');

            // Marca como modo demo
            localStorage.setItem('isDemoMode', 'true');

            // Tenta fazer login com usuário demo
            const result = await authManager.signIn(
                DEMO_USER.email,
                DEMO_USER.password
            );

            if (result.success) {
                showMessage('✅ Modo demo ativado!', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 500);
            } else {
                // Se falhar, cria modo local (sem Supabase)
                console.warn('Demo login failed, using local mode');
                localStorage.setItem('demoLocalMode', 'true');
                window.location.href = 'index.html';
            }
        }

        // Login page logic
        document.addEventListener('DOMContentLoaded', async () => {
            await authManager.init();

            // Se já está em modo demo, redireciona
            if (localStorage.getItem('isDemoMode') === 'true' && authManager.isAuthenticated()) {
                window.location.href = 'index.html';
                return;
            }

            // Redirect if already authenticated (não demo)
            if (authManager.isAuthenticated()) {
                window.location.href = 'index.html';
                return;
            }

            // Handle form submission
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                const result = await authManager.signIn(email, password);

                if (result.success) {
                    // Remove modo demo se estava ativo
                    localStorage.removeItem('isDemoMode');

                    showMessage('Login realizado com sucesso! Redirecionando...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showMessage(result.error || 'Erro ao fazer login. Verifique suas credenciais.', 'error');
                }
            });
        });
            if (authManager.isAuthenticated()) {
                window.location.href = 'index.html';
                return;
            }

            // Handle form submission
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                const result = await authManager.signIn(email, password);

                if (result.success) {
                    showMessage('Login realizado com sucesso! Redirecionando...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showMessage(result.error || 'Erro ao fazer login. Verifique suas credenciais.', 'error');
                }
            });
        });

        function showMessage(message, type) {
            const errorEl = document.getElementById('errorMessage');
            const successEl = document.getElementById('successMessage');

            if (type === 'error') {
                errorEl.textContent = message;
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
            } else {
                successEl.textContent = message;
                successEl.style.display = 'block';
                errorEl.style.display = 'none';
            }
        }
    </script>
</body>
</html>
